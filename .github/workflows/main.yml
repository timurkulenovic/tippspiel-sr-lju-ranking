name: Tippspiel Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *" # adjust as needed (UTC)

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
          python -m playwright install chromium

      - name: Create config.toml from secrets
        shell: bash
        run: |
          cat > config.toml <<EOF
          [auth]
          email = "${{ secrets.TIPPSPIEL_AUTH_EMAIL }}"
          password = "${{ secrets.TIPPSPIEL_AUTH_PASSWORD }}"
          EOF

      - name: Run crawler pipeline
        shell: bash
        env:
          CI: "true"
          TIMEOUT_MS: "120000"
          HTML_FILE: "index.html"
        run: |
          chmod +x ./scripts/run_full_pipeline.sh
          ./scripts/run_full_pipeline.sh

      - name: Commit and push index.html
        if: always()
        shell: bash
        run: |
          if [[ -f index.html ]] && [[ -n "$(git status --porcelain -- index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: update index.html"
            git push
          else
            echo "No index.html changes to commit."
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-${{ github.run_number }}
          path: |
            ranking.json
            index.html
          retention-days: 30

      - name: Cleanup config
        if: always()
        shell: bash
        run: rm -f config.toml
